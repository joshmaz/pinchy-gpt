name: Link check

on:
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC
  pull_request:
    branches: [ main ]

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: '--ignore ./data/exports --format json -o lychee-report.json'
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: lychee-report.json
      - name: Fail if broken links
        run: |
          if [ -f lychee-report.json ]; then
            jq '.broken | length' lychee-report.json | read count || true
            COUNT=$(jq '.broken | length' lychee-report.json)
            if [ "$COUNT" -gt 0 ]; then
              echo "Broken links detected: $COUNT. See lychee-report.json" && exit 1
            fi
          fi
