name: Scrape NEPL Results

on:
  schedule:
    # Run daily at 09:00 UTC which corresponds to 05:00 America/New_York
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run NEPL scraper
        env:
          TZ: America/New_York
        run: |
          python scripts/nepl_scraper.py --season 35 --outdir .

      - name: Upload standings artifact
        uses: actions/upload-artifact@v4
        with:
          name: nepl-standings-season-35
          path: nepl_standings_season_35_*.json

      - name: Upload score sheets artifact
        uses: actions/upload-artifact@v4
        with:
          name: nepl-scoresheets-season-35
          path: nepl_scoresheets_season_35_*.json